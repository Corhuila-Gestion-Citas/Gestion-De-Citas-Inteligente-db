databaseChangeLog:
  - changeSet:
      id: 002-create-turnos-table
      author: yeison
      changes:
        - createTable:
            tableName: turnos
            columns:
              - column:
                  name: id_turno
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: doctor
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: especialidad
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: estado
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: fecha_creacion
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: fecha_hora
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: id_usuario
                  type: BIGINT
                  constraints:
                    nullable: false